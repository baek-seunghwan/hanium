<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}생활위험 코파일럿{% endblock %}</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --bg: #0b1120;
      --bg-secondary: #111827;
      --surface: #1e293b;
      --surface-hover: #253348;
      --glass: rgba(15,23,42,.82);
      --glass-border: rgba(255,255,255,.08);
      --border: rgba(255,255,255,.06);
      --border-hover: rgba(255,255,255,.12);
      --text: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --primary: #3b82f6;
      --primary-soft: rgba(59,130,246,.15);
      --primary-glow: rgba(59,130,246,.25);
      --danger: #ef4444;
      --danger-soft: rgba(239,68,68,.15);
      --warn: #f59e0b;
      --warn-soft: rgba(245,158,11,.12);
      --success: #10b981;
      --success-soft: rgba(16,185,129,.12);
      --info: #06b6d4;
      --info-soft: rgba(6,182,212,.12);
      --radius: 12px;
      --radius-sm: 8px;
      --radius-xs: 6px;
      --shadow: 0 4px 24px rgba(0,0,0,.3);
      --shadow-lg: 0 8px 40px rgba(0,0,0,.4);
      --transition: .2s cubic-bezier(.4,0,.2,1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ─── Top Bar ─── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      height: 56px;
      background: var(--glass);
      backdrop-filter: blur(20px) saturate(1.8);
      -webkit-backdrop-filter: blur(20px) saturate(1.8);
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
    }
    .topbar-logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; color: var(--text); flex-shrink: 0;
    }
    .topbar-logo-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 12px rgba(59,130,246,.3);
    }
    .topbar-logo-icon svg { width: 18px; height: 18px; color: #fff; }
    .topbar-logo span { font-weight: 700; font-size: 16px; letter-spacing: -.3px; }

    /* ─── Ticker ─── */
    .ticker {
      flex: 1;
      overflow: hidden;
      position: relative;
      height: 28px;
      margin: 0 16px;
      background: rgba(239,68,68,.08);
      border-radius: 14px;
      border: 1px solid rgba(239,68,68,.15);
    }
    .ticker-label {
      position: absolute; left: 0; top: 0; bottom: 0;
      background: var(--danger);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 0 12px;
      display: flex; align-items: center; gap: 4px;
      border-radius: 14px;
      z-index: 1;
      letter-spacing: .3px;
    }
    .ticker-track {
      display: flex;
      animation: tickerScroll 40s linear infinite;
      padding-left: 70px;
      height: 100%;
      align-items: center;
    }
    .ticker-track:hover { animation-play-state: paused; }
    .ticker-item {
      white-space: nowrap;
      font-size: 12px;
      color: var(--text-secondary);
      padding: 0 32px;
      flex-shrink: 0;
    }
    .ticker-item strong { color: var(--warn); font-weight: 600; margin-right: 6px; }
    @keyframes tickerScroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .topbar-right {
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .topbar-time {
      font-size: 12px; color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    /* ─── Navigation ─── */
    .nav-bar {
      position: fixed; top: 56px; left: 0; right: 0; z-index: 999;
      height: 48px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 2px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 16px;
      font-size: 13px; font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      border-radius: var(--radius-sm);
      transition: all var(--transition);
      white-space: nowrap;
      position: relative;
    }
    .nav-item:hover { color: var(--text-secondary); background: rgba(255,255,255,.04); }
    .nav-item.active { color: var(--primary); background: var(--primary-soft); font-weight: 600; }
    .nav-item svg { width: 16px; height: 16px; opacity: .6; }
    .nav-item.active svg { opacity: 1; }
    .nav-sep { width: 1px; height: 20px; background: var(--border); margin: 0 8px; }
    .nav-badge {
      font-size: 10px; font-weight: 700;
      background: var(--danger);
      color: #fff;
      padding: 1px 6px;
      border-radius: 10px;
      line-height: 1.4;
    }

    /* ─── Content Area ─── */
    .page-body {
      margin-top: 104px;
      min-height: calc(100vh - 104px);
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 24px 80px;
    }

    /* ─── Cards ─── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 16px;
      transition: all var(--transition);
    }
    .card:hover { border-color: var(--border-hover); }
    .card-header {
      font-size: 15px; font-weight: 650; color: var(--text);
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }

    /* ─── Stats ─── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
    }
    .stat-card.danger::before { background: var(--danger); }
    .stat-card.primary::before { background: var(--primary); }
    .stat-card.success::before { background: var(--success); }
    .stat-card.warn::before { background: var(--warn); }
    .stat-card:hover { border-color: var(--border-hover); transform: translateY(-1px); }
    .stat-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; }
    .stat-value { font-size: 26px; font-weight: 800; letter-spacing: -.5px; line-height: 1.2; }
    .stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    /* ─── Badges ─── */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 650; line-height: 1.4;
    }
    .badge-danger { background: var(--danger-soft); color: var(--danger); }
    .badge-warn { background: var(--warn-soft); color: var(--warn); }
    .badge-success { background: var(--success-soft); color: var(--success); }
    .badge-info { background: var(--info-soft); color: var(--info); }
    .badge-muted { background: rgba(100,116,139,.15); color: var(--text-muted); }

    /* ─── Buttons ─── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 9px 18px; border-radius: var(--radius-sm);
      border: none; font-size: 13px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all var(--transition);
      text-decoration: none; white-space: nowrap; line-height: 1.4;
    }
    .btn:active { transform: scale(.97); }
    .btn svg { width: 15px; height: 15px; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #2563eb; box-shadow: 0 0 20px var(--primary-glow); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
    .btn-outline:hover { background: rgba(255,255,255,.04); color: var(--text); border-color: var(--border-hover); }
    .btn-ghost { background: transparent; color: var(--text-secondary); padding: 8px 12px; }
    .btn-ghost:hover { background: rgba(255,255,255,.04); color: var(--text); }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .btn-danger { background: var(--danger-soft); color: var(--danger); border: 1px solid rgba(239,68,68,.2); }
    .btn-danger:hover { background: rgba(239,68,68,.25); }

    /* ─── Forms ─── */
    .form-control {
      padding: 9px 14px; border: 1px solid var(--border);
      border-radius: var(--radius-sm); font-size: 13px; font-family: inherit;
      background: var(--bg-secondary); color: var(--text);
      transition: all var(--transition); outline: none;
    }
    .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
    .form-control::placeholder { color: var(--text-muted); }
    .form-label { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: .5px; margin-bottom: 5px; display: block; }

    /* ─── Pagination ─── */
    .pagination { display: flex; justify-content: center; gap: 4px; padding: 24px 0; }
    .page-btn {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 36px; height: 36px; padding: 0 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      font-size: 13px; font-weight: 500; font-family: inherit;
      text-decoration: none; cursor: pointer;
      transition: all var(--transition);
    }
    .page-btn:hover { background: var(--surface-hover); color: var(--text); }
    .page-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .page-btn.disabled { opacity: .3; pointer-events: none; }

    /* ─── Map Container ─── */
    .map-wrap {
      border-radius: var(--radius); overflow: hidden;
      border: 1px solid var(--border); margin-bottom: 16px;
    }
    .map-wrap .leaflet-container { background: var(--bg-secondary); }

    /* ─── Message Cards ─── */
    .msg-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 8px;
      transition: all var(--transition);
    }
    .msg-card:hover { border-color: var(--primary); box-shadow: 0 0 0 1px var(--primary-soft); }
    .msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .msg-time { font-size: 12px; color: var(--text-muted); margin-left: auto; font-variant-numeric: tabular-nums; }
    .msg-body { font-size: 13px; line-height: 1.7; color: var(--text-secondary); }
    .msg-region {
      font-size: 12px; color: var(--text-muted); margin-top: 8px;
      display: flex; align-items: center; gap: 4px;
    }

    /* ─── Shelter Cards ─── */
    .shelter-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 8px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px; align-items: start;
      transition: all var(--transition);
    }
    .shelter-card:hover { border-color: var(--primary); box-shadow: 0 0 0 1px var(--primary-soft); }
    .shelter-name { font-size: 14px; font-weight: 650; margin-bottom: 3px; }
    .shelter-addr { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
    .shelter-meta { display: flex; gap: 14px; flex-wrap: wrap; font-size: 12px; color: var(--text-secondary); }
    .shelter-meta span { display: flex; align-items: center; gap: 4px; }
    .shelter-distance { text-align: right; }

    /* ─── Alerts & Empty ─── */
    .alert {
      padding: 14px 18px; border-radius: var(--radius); margin-bottom: 16px;
      font-size: 13px; display: flex; align-items: flex-start; gap: 10px;
    }
    .alert svg { flex-shrink: 0; margin-top: 1px; }
    .alert-danger { background: var(--danger-soft); color: #fca5a5; border: 1px solid rgba(239,68,68,.2); }
    .alert-warn { background: var(--warn-soft); color: #fcd34d; border: 1px solid rgba(245,158,11,.2); }
    .alert-info { background: var(--info-soft); color: #67e8f9; border: 1px solid rgba(6,182,212,.2); }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-state svg { margin-bottom: 16px; opacity: .3; }
    .empty-state h3 { font-size: 15px; color: var(--text-secondary); margin-bottom: 6px; }
    .empty-state p { font-size: 13px; }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      .topbar { padding: 0 12px; gap: 8px; }
      .topbar-logo span { display: none; }
      .ticker { display: none; }
      .nav-bar { padding: 0 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .nav-bar::-webkit-scrollbar { display: none; }
      .nav-item { padding: 8px 10px; font-size: 12px; }
      .container { padding: 16px 12px 40px; }
      .stats-row { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .shelter-card { grid-template-columns: 1fr; }
    }

    /* ─── Animations ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .anim { animation: fadeUp .35s ease-out both; }
    .anim-d1 { animation-delay: .05s; }
    .anim-d2 { animation-delay: .1s; }
    .anim-d3 { animation-delay: .15s; }

    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
  <!-- ═══ Top Bar ═══ -->
  <header class="topbar">
    <a href="/" class="topbar-logo">
      <div class="topbar-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M12 9v4"/><path d="M12 17h.01"/>
          <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
        </svg>
      </div>
      <span>생활위험 코파일럿</span>
    </a>

    <div class="ticker" id="ticker">
      <div class="ticker-label">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l2 2"/></svg>
        속보
      </div>
      <div class="ticker-track" id="tickerTrack">
        {% block ticker_items %}
          <span class="ticker-item">재난안전 통합 정보 시스템에 오신 것을 환영합니다.</span>
        {% endblock %}
      </div>
    </div>

    <div class="topbar-right">
      <span class="topbar-time" id="clock">{% block header_extra %}{% endblock %}</span>
    </div>
  </header>

  <!-- ═══ Navigation ═══ -->
  <nav class="nav-bar">
    <a href="/" class="nav-item {{ 'active' if active_tab=='home' }}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      종합현황
    </a>
    <div class="nav-sep"></div>
    <a href="/disaster" class="nav-item {{ 'active' if active_tab=='disaster' }}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
      긴급재난문자
      {% block disaster_badge %}{% endblock %}
    </a>
    <a href="/shelters" class="nav-item {{ 'active' if active_tab=='shelters' }}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      무더위쉼터
    </a>
    <div class="nav-sep"></div>
    <span class="nav-item" style="opacity:.4;cursor:default">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2v10"/><path d="M18.4 6.6L12 12"/><circle cx="12" cy="12" r="10"/></svg>
      기상특보
    </span>
    <span class="nav-item" style="opacity:.4;cursor:default">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      AED
    </span>
    <span class="nav-item" style="opacity:.4;cursor:default">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
      대피소
    </span>
  </nav>

  <!-- ═══ Page Content ═══ -->
  <div class="page-body">
    {% block content %}{% endblock %}
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Live clock
    (function updateClock() {
      const el = document.getElementById('clock');
      if (el) {
        const now = new Date();
        const pad = n => String(n).padStart(2, '0');
        el.textContent = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
      }
      setTimeout(updateClock, 1000);
    })();
  </script>
  {% block extra_script %}{% endblock %}
</body>
</html>
